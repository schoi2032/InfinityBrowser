<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Search</title>
    <style>
        :root {
            --sc-primary: #1e40af;
            --sc-bg: #0f172a;
            --sc-toolbar: #ffffff;
            --sc-border: #cbd5e1;
            --sc-text: #0f172a;
            --sc-text-light: #64748b;
            --sc-accent: #3b82f6;
            --sc-tab-inactive: #1e293b;
            /* Logo Gradient */
            --logo-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--sc-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Tab Strip --- */
        #sc-tabs-bar {
            background: var(--sc-bg);
            display: flex;
            align-items: flex-end;
            padding: 8px 10px 0;
            gap: 5px;
            height: 42px;
            user-select: none;
        }

        .sc-tab {
            background: var(--sc-tab-inactive);
            color: #94a3b8;
            height: 34px;
            min-width: 120px;
            max-width: 200px;
            padding: 0 12px;
            border-radius: 8px 8px 0 0;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            position: relative;
            transition: background 0.2s, color 0.2s;
        }

        .sc-tab.active {
            background: var(--sc-toolbar);
            color: var(--sc-text);
            z-index: 2;
        }

        .sc-tab:hover:not(.active) {
            background: #334155;
            color: #f1f5f9;
        }

        .tab-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .tab-close {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            margin-left: 8px;
            font-size: 14px;
        }

        .tab-close:hover {
            background: rgba(0,0,0,0.1);
            color: #ef4444;
        }

        #new-tab-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
        }

        #new-tab-btn:hover { background: rgba(255,255,255,0.1); }

        /* --- Nav Toolbar --- */
        #sc-toolbar {
            background: var(--sc-toolbar);
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 10px;
            border-bottom: 1px solid var(--sc-border);
            z-index: 100;
        }

        .nav-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--sc-text);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover { background: #f1f5f9; }

        #address-container {
            flex: 1;
            height: 34px;
            background: #f1f5f9;
            border: 1px solid var(--sc-border);
            border-radius: 17px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
        }

        #url-input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            font-size: 13px;
            color: var(--sc-text);
        }

        /* --- Engine --- */
        #sc-engine {
            flex: 1;
            background: white;
            position: relative;
        }

        .view-pane {
            width: 100%;
            height: 100%;
            display: none;
            position: relative;
        }

        .view-pane.active { display: block; }

        /* Infinity Branding Overlay - Left Side Logo Coverage */
        .engine-mask {
            position: absolute;
            background: white;
            z-index: 9999;
            display: none;
            pointer-events: none;
            top: 0;
            left: 0;
            width: 190px;
            height: 85px;
            align-items: center;
            padding-left: 30px;
            /* Box shadow helps blend into the iframe's header background */
            box-shadow: 0 5px 10px rgba(0,0,0,0.01); 
        }

        .engine-mask.visible { display: flex; }

        .mask-logo {
            font-size: 30px;
            font-weight: 900;
            background: var(--logo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            user-select: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* --- Internal UI (Dashboard) --- */
        .sc-internal-ui {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            background: #fff;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sc-hero {
            text-align: center;
            margin-bottom: 30px;
        }

        .sc-hero h1 {
            font-size: 64px;
            font-weight: 900;
            background: var(--logo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -3px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }

        .sc-search-wrap {
            width: 100%;
            max-width: 580px;
            position: relative;
        }

        .sc-search-input {
            width: 100%;
            padding: 14px 24px;
            border-radius: 24px;
            border: 1px solid #dfe1e5;
            font-size: 16px;
            outline: none;
            box-shadow: 0 1px 6px rgba(0,0,0,.1);
            transition: box-shadow 0.2s;
        }

        .sc-search-input:focus {
            box-shadow: 0 1px 12px rgba(59, 130, 246, 0.2);
            border-color: var(--sc-accent);
        }

        .sc-quick-links {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .q-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
            color: var(--sc-text);
            width: 80px;
        }

        .q-icon {
            width: 48px;
            height: 48px;
            background: #f1f5f9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: var(--sc-accent);
            transition: all 0.2s;
        }

        .q-link:hover .q-icon { background: #e2e8f0; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Security Modal */
        #security-notice {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 24px;
            z-index: 1000;
            display: none;
            text-align: center;
        }

        .modal-btn {
            width: 100%;
            padding: 12px;
            background: var(--sc-accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: opacity 0.2s;
        }
        
        .modal-btn:hover { opacity: 0.9; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-right: 5px; }
        .status-dot.error { background: #ef4444; }
    </style>
</head>
<body>

    <div id="sc-tabs-bar">
        <div id="tabs-container" style="display: flex; gap: 4px;"></div>
        <div id="new-tab-btn" onclick="createNewTab()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
    </div>

    <div id="sc-toolbar">
        <button class="nav-btn" onclick="historyNav(-1)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>
        <button class="nav-btn" onclick="historyNav(1)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></button>
        <button class="nav-btn" onclick="reloadCurrent()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
        
        <div id="address-container">
            <div id="status-dot" class="status-dot"></div>
            <input type="text" id="url-input" placeholder="Search Infinity or type URL" onkeydown="if(event.key==='Enter') navigate()">
        </div>

        <button class="nav-btn" onclick="loadUrl('sc://home')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></button>
    </div>

    <div id="sc-engine">
        <div id="security-notice">
            <h3 style="font-size: 18px; margin-bottom: 10px; color: #1e293b;">Infinity Secure Browse</h3>
            <p style="font-size: 14px; color: #64748b; line-height: 1.5;">This site is restricted in embedded view. Open in a dedicated Infinity window to continue.</p>
            <button class="modal-btn" id="btn-external">Open Securely in New Tab</button>
            <button class="modal-btn" style="background:#f1f5f9; color:#475569; margin-top:8px;" onclick="hideNotice()">Cancel</button>
        </div>
    </div>

    <script>
        const PROTOCOL_HOME = "sc://home";
        let tabs = [];
        let activeTabId = null;

        function init() { createNewTab(); }

        function createNewTab(url = PROTOCOL_HOME) {
            const id = 'tab-' + Math.random().toString(36).substr(2, 9);
            tabs.push({ id, url, title: "Infinity Tab" });
            switchTab(id);
        }

        function switchTab(id) {
            activeTabId = id;
            const tab = tabs.find(t => t.id === id);
            
            updateUrlInputDisplay(tab.url);
            
            const engine = document.getElementById('sc-engine');
            Array.from(engine.getElementsByClassName('view-pane')).forEach(p => p.classList.remove('active'));

            let pane = document.getElementById('pane-' + id);
            if(!pane) {
                pane = document.createElement('div');
                pane.id = 'pane-' + id;
                pane.className = 'view-pane active';
                
                // Branding Mask
                const mask = document.createElement('div');
                mask.className = 'engine-mask';
                mask.innerHTML = '<span class="mask-logo">Infinity</span>';
                pane.appendChild(mask);
                
                engine.appendChild(pane);
                renderContent(tab.url, pane);
            } else {
                pane.classList.add('active');
                toggleBranding(tab.url, pane);
            }
            
            renderTabStrip();
            hideNotice();
        }

        function toggleBranding(url, container) {
            const mask = container.querySelector('.engine-mask');
            if(mask) {
                if(url.includes('google.com/search')) {
                    mask.classList.add('visible');
                } else {
                    mask.classList.remove('visible');
                }
            }
        }

        function updateUrlInputDisplay(url) {
            const input = document.getElementById('url-input');
            if (url === PROTOCOL_HOME) {
                input.value = "";
            } else if (url.includes('google.com/search')) {
                try {
                    const urlObj = new URL(url);
                    const query = urlObj.searchParams.get('q') || "";
                    input.value = `infinity.org/search?q=${query}`;
                } catch(e) {
                    input.value = "infinity.org/search";
                }
            } else {
                input.value = url;
            }
        }

        function renderContent(url, container) {
            const existingIframe = container.querySelector('iframe');
            if(existingIframe) existingIframe.remove();
            
            const internalUI = container.querySelector('.sc-internal-ui');
            if(internalUI) internalUI.remove();
            
            // Apply branding immediately if it's a search
            toggleBranding(url, container);

            if(url === PROTOCOL_HOME) {
                const div = document.createElement('div');
                div.className = 'sc-internal-ui';
                div.innerHTML = `
                    <div class="sc-hero">
                        <h1>Infinity</h1>
                    </div>
                    <div class="sc-search-wrap">
                        <input type="text" class="sc-search-input" autofocus placeholder="Search with Infinity..." onkeydown="if(event.key==='Enter') quickSearch(this.value)">
                    </div>
                    <div class="sc-quick-links">
                        <div class="q-link" onclick="loadUrl('https://wikipedia.org')"><div class="q-icon">W</div><span>Wiki</span></div>
                        <div class="q-link" onclick="loadUrl('https://github.com')"><div class="q-icon">G</div><span>GitHub</span></div>
                        <div class="q-link" onclick="loadUrl('https://youtube.com')"><div class="q-icon">Y</div><span>YouTube</span></div>
                        <div class="q-link" onclick="loadUrl('https://reddit.com')"><div class="q-icon">R</div><span>Reddit</span></div>
                    </div>`;
                container.appendChild(div);
            } else {
                const iframe = document.createElement('iframe');
                iframe.src = url;
                
                let hasLoaded = false;
                let timer = setTimeout(() => {
                    if (!hasLoaded) {
                        showNotice(url);
                        document.getElementById('status-dot').className = 'status-dot error';
                    }
                }, 3500);

                iframe.onload = () => {
                    hasLoaded = true;
                    clearTimeout(timer);
                    document.getElementById('status-dot').className = 'status-dot';
                    updateTitle(url);
                };
                container.appendChild(iframe);
            }
        }

        function navigate() {
            let val = document.getElementById('url-input').value.trim();
            if(!val) return;
            
            if(val.startsWith('infinity.org/search?q=')) {
                quickSearch(val.split('q=')[1]);
                return;
            }

            if(val.match(/^[a-z0-9-]+\.[a-z]{2,}/i) || val.startsWith('http')) {
                loadUrl(val.startsWith('http') ? val : 'https://' + val);
            } else {
                quickSearch(val);
            }
        }

        function quickSearch(q) {
            loadUrl(`https://www.google.com/search?q=${encodeURIComponent(q)}&igu=1`);
        }

        function loadUrl(url) {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab) return;
            tab.url = url;
            const pane = document.getElementById('pane-' + tab.id);
            if (pane) renderContent(url, pane);
            updateUrlInputDisplay(url);
            renderTabStrip();
        }

        function updateTitle(url) {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab) return;
            
            if(url.includes('google.com/search')) {
                try {
                    const urlObj = new URL(url);
                    const query = urlObj.searchParams.get('q') || "";
                    tab.title = `${query} - Infinity Search`;
                } catch(e) {
                    tab.title = "Infinity Search";
                }
            } else {
                try { 
                    const host = new URL(url).hostname;
                    tab.title = host.replace('www.', '');
                } catch { tab.title = "Infinity Tab"; }
            }
            renderTabStrip();
        }

        function renderTabStrip() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            tabs.forEach(tab => {
                const div = document.createElement('div');
                div.className = `sc-tab ${tab.id === activeTabId ? 'active' : ''}`;
                div.onclick = () => switchTab(tab.id);
                div.innerHTML = `
                    <span class="tab-title">${tab.title}</span>
                    <span class="tab-close" onclick="closeTab(event, '${tab.id}')">&times;</span>
                `;
                container.appendChild(div);
            });
        }

        function closeTab(e, id) {
            e.stopPropagation();
            if(tabs.length === 1) { loadUrl(PROTOCOL_HOME); return; }
            const index = tabs.findIndex(t => t.id === id);
            const pane = document.getElementById('pane-' + id);
            if (pane) pane.remove();
            tabs = tabs.filter(t => t.id !== id);
            if(activeTabId === id) {
                const nextTab = tabs[index] || tabs[index-1];
                switchTab(nextTab.id);
            } else {
                renderTabStrip();
            }
        }

        function showNotice(url) {
            const modal = document.getElementById('security-notice');
            modal.style.display = 'block';
            document.getElementById('btn-external').onclick = () => {
                window.open(url, '_blank');
                hideNotice();
            };
        }

        function hideNotice() {
            document.getElementById('security-notice').style.display = 'none';
        }

        function historyNav(dir) {
            const frame = document.querySelector('.view-pane.active iframe');
            if(frame) {
                try {
                    if(dir === -1) frame.contentWindow.history.back();
                    else frame.contentWindow.history.forward();
                } catch(e) {}
            }
        }

        function reloadCurrent() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab) renderContent(tab.url, document.getElementById('pane-' + tab.id));
        }

        window.onload = init;
    </script>
</body>
</html>
